user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept off;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$anonymized_remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$generated_request_id"'
      '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;
    log_subrequest off;
    
    map $http_x_request_id $generated_request_id {
        default $http_x_request_id;
        "" $request_time-$remote_addr-$remote_port-$connection-$connection_requests-$msec;
    }

    map $status $anonymized_remote_addr {
        ~^[23] $masked_remote_addr;
        default $remote_addr;
    }

    map $remote_addr $masked_remote_addr {
        ~(?P<ip>\d+\.\d+\.\d+)\.\d+ $ip.0;
        default "0.0.0.0";
    }

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=users:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=users_post:10m rate=5r/m;
    
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    upstream api {
        server api:5050;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_body_buffer_size 16K;
        client_header_buffer_size 1k;
        client_max_body_size 16m;
        large_client_header_buffers 4 16k;

        client_body_timeout 12;
        client_header_timeout 12;
        send_timeout 10;
        
        location ~ (\.php|\.aspx|\.asp|myadmin|xmlrpc|env|\.git|\.htaccess|\.htpasswd) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location / {
            limit_req zone=global burst=20;
            limit_req_status 429;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $generated_request_id;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/auth {
            limit_req zone=auth burst=5 nodelay;
            limit_conn conn_limit_per_ip 10;
            limit_req_status 429;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $generated_request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = /api/users {
            limit_req zone=users_post burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $generated_request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location ^~ /api/users {
            limit_req zone=users burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $generated_request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
